<div id="todo-{ todo.id }" class="flex items-center justify-between p-4 bg-zinc-900 rounded-2xl">
  <div class="flex items-center gap-3 flex-1 min-w-0">
    if (todo.completed) {
    <button hx-post="/todo/{ todo.id }/update"
            hx-vals='{"completed": "false"}'
            hx-target="#todo-{ todo.id }"
            hx-swap="outerHTML"
            class="w-5 h-5 flex items-center justify-center rounded border bg-green-500 border-green-500 text-zinc-950 text-sm font-bold">✓</button>
    } else {
    <button hx-post="/todo/{ todo.id }/update"
            hx-vals='{"completed": "true"}'
            hx-target="#todo-{ todo.id }"
            hx-swap="outerHTML"
            class="w-5 h-5 flex items-center justify-center rounded border border-zinc-600 hover:border-zinc-400 text-sm font-bold"></button>
    }
    if (todo.completed) {
    <span class="line-through text-zinc-500 text-sm truncate">{ todo.title }</span>
    } else {
    <span class="text-white text-sm truncate">{ todo.title }</span>
    }
  </div>
  <button hx-post="/todo/{ todo.id }/delete"
          hx-target="#todo-{ todo.id }"
          hx-swap="outerHTML"
          class="w-7 h-7 flex items-center justify-center rounded-lg text-zinc-600 hover:text-red-400 hover:bg-zinc-800 transition-colors">
    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M6 18L18 6M6 6l12 12"/>
    </svg>
  </button>
</div>
